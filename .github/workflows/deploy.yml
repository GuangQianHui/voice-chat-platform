name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: |
          node -c js/main.js
          node -c js/managers/*.js
          node -c js/speech/*.js
          node -c js/audio/*.js

      - name: Create deployment package
        run: |
          mkdir -p dist
          cp -r css dist/
          cp -r js dist/
          cp -r images dist/
          cp -r resources dist/
          cp index.html dist/
          cp server.js dist/
          cp package.json dist/
          cp README.md dist/
          cp LICENSE dist/

      - name: Upload to GitHub Releases
        uses: actions/upload-artifact@v4
        with:
          name: voice-chat-platform-${{ github.sha }}
          path: dist/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 更新内容

            请查看 [CHANGELOG.md](CHANGELOG.md) 了解详细更新内容。

            ## 下载

            下载并解压后运行：
            ```bash
            npm install
            npm start
            ```
          draft: false
          prerelease: false
